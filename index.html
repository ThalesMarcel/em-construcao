<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Em Breve - Nome da Empresa</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <div class="page-wrapper">

            <main class="content-section">

											<i class="fa-brands fa-facebook-f"></i>
									</a>
									<a href="#" class="social-icon tw" aria-label="Twitter">
